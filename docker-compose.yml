version: '3.8'

services:
  runtime-sandbox:
    build: .
    volumes:
      - .:/app
    command: tail -f /dev/null

  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: determinai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: determinai_runtime
    ports:
      - "5432:5432"

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
